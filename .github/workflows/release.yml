name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-darwin:
    name: macOS (Universal)
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build macOS binary
        env:
          CGO_ENABLED: '1'
          GOOS: darwin
        run: |
          GOARCH=amd64 go build -tags production -trimpath -buildvcs=false -ldflags="-w -s" -o bin/Gittar-amd64
          GOARCH=arm64 go build -tags production -trimpath -buildvcs=false -ldflags="-w -s" -o bin/Gittar-arm64
          lipo -create -output bin/Gittar bin/Gittar-amd64 bin/Gittar-arm64

      - name: Create .app bundle
        run: |
          mkdir -p bin/Gittar.app/Contents/MacOS
          mkdir -p bin/Gittar.app/Contents/Resources
          cp bin/Gittar bin/Gittar.app/Contents/MacOS/Gittar
          mkdir -p bin/Gittar.app/Contents/Resources/frontend/dist
          cp -r frontend/dist/* bin/Gittar.app/Contents/Resources/frontend/dist/
          codesign --force --deep --sign - bin/Gittar.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: Gittar-darwin-universal
          path: bin/Gittar.app
          retention-days: 5

  build-windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build Windows binary
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: go build -tags production -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui" -o bin/Gittar.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: Gittar-windows-amd64
          path: bin/Gittar.exe
          retention-days: 5

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libc6-dev
          sudo apt-get install -y libgtk-3-dev libsoup-3.0-dev libwebkit2gtk-4.1-dev

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build Linux binaries (with gtk3 tag)
        env:
          CGO_ENABLED: '1'
        run: |
          GOOS=linux GOARCH=amd64 go build -tags "production,gtk3" -trimpath -buildvcs=false -ldflags="-w -s" -o bin/Gittar-linux-amd64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: Gittar-linux-amd64
          path: bin/Gittar-linux-amd64
          retention-days: 5

  ci-pass:
    name: Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [build-darwin, build-windows, build-linux]
    if: ${{ always() && !cancelled() }}
    steps:
      - name: Check results
        run: echo "Release builds passed."
