name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-darwin:
    name: macOS (Universal)
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build macOS binary
        env:
          CGO_ENABLED: '1'
          GOOS: darwin
        run: |
          GOARCH=amd64 go build -tags production -trimpath -buildvcs=false -ldflags="-w -s" -o bin/Gittar-amd64
          GOARCH=arm64 go build -tags production -trimpath -buildvcs=false -ldflags="-w -s" -o bin/Gittar-arm64
          lipo -create -output bin/Gittar bin/Gittar-amd64 bin/Gittar-arm64

      - name: Create .app bundle
        run: |
          mkdir -p bin/Gittar.app/Contents/MacOS
          mkdir -p bin/Gittar.app/Contents/Resources
          cp bin/Gittar bin/Gittar.app/Contents/MacOS/Gittar
          mkdir -p bin/Gittar.app/Contents/Resources/frontend/dist
          cp -r frontend/dist/* bin/Gittar.app/Contents/Resources/frontend/dist/
          codesign --force --deep --sign - bin/Gittar.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gittar-darwin-universal
          path: bin/Gittar.app
          retention-days: 5

  build-windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build Windows binary
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: go build -tags production -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui" -o bin/Gittar.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gittar-windows-amd64
          path: bin/Gittar.exe
          retention-days: 5

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libc6-dev libgtk-3-dev libgtk-4-dev libsoup-3.0-dev
          sudo apt-get install -y libwebkit2gtk-4.1-dev 2>/dev/null || sudo apt-get install -y libwebkit2gtk-4.0-dev 2>/dev/null || sudo apt-get install -y libwebkit2gtk-dev 2>/dev/null || true
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig" >> "$GITHUB_ENV"

      - name: Fix webkitgtk pkg-config symlink
        run: |
          PC=$(ls /usr/lib/x86_64-linux-gnu/pkgconfig/webkit2gtk-4*.pc 2>/dev/null | head -1)
          if [ -n "$PC" ]; then
            sudo ln -sf "$(basename "$PC")" /usr/lib/x86_64-linux-gnu/pkgconfig/webkitgtk-6.0.pc
          fi

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build Linux binaries
        env:
          CGO_ENABLED: '1'
        run: |
          GOOS=linux GOARCH=amd64 go build -tags production -trimpath -buildvcs=false -ldflags="-w -s" -o bin/Gittar-linux-amd64
          GOOS=linux GOARCH=arm64 go build -tags production -trimpath -buildvcs=false -ldflags="-w -s" -o bin/Gittar-linux-arm64

      - name: Upload Linux amd64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gittar-linux-amd64
          path: bin/Gittar-linux-amd64
          retention-days: 5

      - name: Upload Linux arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: Gittar-linux-arm64
          path: bin/Gittar-linux-arm64
          retention-days: 5

  ci-pass:
    name: Release Gate
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [build-darwin, build-windows, build-linux]
    if: ${{ always() && !cancelled() }}
    steps:
      - name: Check results
        run: echo "Release builds passed."
